# Automated npm releases via Changesets
#
# Flow:
# 1. PRs merged to main with .changeset/ files trigger this workflow
# 2. The "Version Packages" PR is auto-created/updated with bumped versions + changelog
# 3. Merging the "Version Packages" PR triggers npm publish + git tags
#
# Publishes via npm Trusted Publishing (OIDC) — no long-lived token. Each
# @n-dx/* package must have a Trusted Publisher configured at npmjs.com
# pointing at this workflow (en-dash-consulting/n-dx, release.yml,
# environment "npm"). Trusted publisher config is per-package, not per-scope.

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: npm
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm for Trusted Publishing
        # OIDC trusted publishing and provenance attestation require npm
        # >= 11.5.1. Node 22 ships with npm 10.x by default.
        #
        # Pinned to 11.15.0: npm 11.16.0 (released 2026-05-27) regressed
        # `npm info` with "Invalid time value" against npmjs.org metadata,
        # breaking `changeset publish`. Revisit when npm ships a fix.
        run: npm install -g npm@11.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check obfuscated code policy
        run: pnpm security:obfuscation

      - name: Build
        run: pnpm build

      - name: Run unit tests
        run: pnpm -r run test

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm exec changeset version
          publish: pnpm exec changeset publish --access public
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NODE_AUTH_TOKEN — auth comes from GitHub OIDC. id-token: write
          # above grants the runner permission to mint the OIDC token that
          # pnpm/npm exchange with the registry for a short-lived publish
          # credential.
          NPM_CONFIG_PROVENANCE: true
